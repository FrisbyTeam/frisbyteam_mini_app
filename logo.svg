<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  
  <!-- Чистый логотип T+F (прозрачный фон) -->
  <g fill="url(#goldGrad)" stroke="#050505" stroke-width="8" stroke-linejoin="round">
    <!-- Вертикаль T -->
    <rect x="226" y="130" width="60" height="260" rx="10"/>
    <!-- Перекладина T -->
    <rect x="130" y="130" width="252" height="60" rx="10"/>
    <!-- Элемент F -->
    <rect x="286" y="250" width="90" height="60" rx="10"/>
  </g>
</svg>
