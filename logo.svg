<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Чёрный фон (квадрат) -->
  <rect width="512" height="512" fill="#050505" rx="80"/>
  <!-- Буква T с элементом F (золотой градиент) -->
  <g fill="url(#goldGrad)" stroke="#050505" stroke-width="8">
    <!-- Вертикальная линия T -->
    <rect x="236" y="100" width="40" height="312" rx="6"/>
    <!-- Верхняя перекладина T -->
    <rect x="120" y="100" width="272" height="40" rx="6"/>
    <!-- Короткая линия вправо (формирует F) -->
    <rect x="256" y="256" width="100" height="40" rx="6"/>
  </g>
  <!-- Градиент золота -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
</svg>
