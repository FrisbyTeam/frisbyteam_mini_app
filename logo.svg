<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Тёмный фон в тон приложению -->
  <rect width="512" height="512" fill="#050505" rx="256"/>
  
  <!-- Жирный золотой контур круга -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#FFD700" stroke-width="20"/>
  
  <!-- Логотип T+F (чёрный с золотой обводкой) -->
  <g fill="#050505" stroke="#FFD700" stroke-width="12" stroke-linejoin="round">
    <!-- Вертикаль T -->
    <rect x="226" y="130" width="60" height="260" rx="10"/>
    <!-- Перекладина T -->
    <rect x="130" y="130" width="252" height="60" rx="10"/>
    <!-- Элемент F (горизонталь вправо) -->
    <rect x="286" y="250" width="90" height="60" rx="10"/>
  </g>
</svg>
