<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FrisbyTeam | Амбар</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --black: #050505;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, #111 60%, #2a2005 85%, var(--gold) 100%);
            color: var(--gold-bright);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-element {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .logo {
            width: 80%;
            max-width: 320px;
            height: auto;
            margin-bottom: 0px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            animation-delay: 0s;
        }
        .brand {
            font-family: 'Russo One', sans-serif;
            font-size: 28px;
            margin-bottom: 4px;            color: var(--gold-bright);
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation-delay: 0.2s;
        }
        .tagline-stat, .tagline-ctrl {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 19px;
            color: #FFD700;
            line-height: 1.4;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }
        .tagline-stat { margin-bottom: 2px; animation-delay: 0.6s; }
        .tagline-ctrl { margin-bottom: 30px; animation-delay: 0.9s; }

        .btn-wrapper {
            animation-delay: 1.2s;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .action-btn {
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #000000;
            border: none;
            padding: 20px 0;
            min-height: 56px;
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 17px;
            font-weight: 700;
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(212, 175, 55, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <img class="logo anim-element" src="logo.png" alt="FrisbyTeam Logo">
    <div class="brand anim-element">FrisbyTeam</div>
    <div class="tagline-stat anim-element">Твоя статистика.</div>
    <div class="tagline-ctrl anim-element">Твой контроль.</div>
    <div class="btn-wrapper anim-element">
        <button class="action-btn" onclick="Telegram.WebApp.showAlert('Раздел в разработке!')">ВОЙТИ</button>    </div>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
