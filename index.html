<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FrisbyTeam | Амбар</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --black: #050505;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, #111 60%, #2a2005 85%, var(--gold) 100%);
            color: var(--gold-bright);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        
        /* ЛОГОТИП */
        .logo {
            width: 80%;
            max-width: 320px;
            height: auto;
            margin-bottom: 0px; /* РАЗРЫВ УБРАН */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* ЗАГОЛОВОК */
        .brand {
            font-family: 'Russo One', sans-serif;
            font-size: 28px;
            margin-bottom: 2px; /* Почти нет отступа до текста */
            color: var(--gold-bright);
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ПОДЗАГОЛОВОК (УВЕЛИЧЕН) */
        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700; /* Жирнее */
            font-size: 20px;  /* Крупнее */
            color: #FFD700;   /* Чуть ярче */
            line-height: 1.3;
            margin-bottom: 28px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        /* КНОПКА */
        .action-btn {
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #000000;
            border: 1px solid #FFD700;
            padding: 14px 0;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            max-width: 260px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
        }
        .action-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <img class="logo" src="logo.png" alt="FrisbyTeam Logo">
    <div class="brand">FrisbyTeam</div>
    <div class="tagline">Твоя статистика.<br>Твой контроль.</div>
    <button class="action-btn" onclick="Telegram.WebApp.showAlert('Раздел в разработке!')">Открыть амбар</button>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
