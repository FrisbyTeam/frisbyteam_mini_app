<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FrisbyTeam | Амбар</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #1c1c1e);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #9e9e9e);
            --button: var(--tg-theme-button-color, #007aff);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .brand { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .tagline { color: var(--hint); font-size: 15px; line-height: 1.4; margin-bottom: 32px; }
        .action-btn {
            background: var(--button);
            color: var(--button-text);
            border: none;
            padding: 14px 0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .action-btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="brand">FrisbyTeam</div>
    <div class="tagline">Твоя статистика.<br>Твой контроль.<br>Твой амбар.</div>
    <button class="action-btn" onclick="Telegram.WebApp.showAlert('Раздел в разработке!')">Открыть статистику</button>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
