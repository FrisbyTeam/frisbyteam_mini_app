<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FrisbyTeam | Амбар</title>
    <!-- Подключаем шрифты: Russo One + Montserrat (кириллица) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --black: #050505;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, #111 60%, #2a2005 85%, var(--gold) 100%);
            color: var(--gold-bright);
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .logo {
            width: 70px;
            height: 70px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
        }
        .brand {
            font-family: 'Russo One', sans-serif;
            font-size: 36px;
            margin-bottom: 12px;
            color: var(--gold-bright);
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: #e5c100;
            line-height: 1.6;
            margin-bottom: 40px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.9);
            letter-spacing: 0.5px;
        }
        .action-btn {
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #000000;
            border: 1px solid #FFD700;
            padding: 16px 0;
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .action-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>
    <img class="logo" src="logo.svg" alt="FrisbyTeam">

    <div class="brand">FrisbyTeam</div>
    <div class="tagline">Твоя статистика.<br>Твой контроль.</div>
    <button class="action-btn" onclick="Telegram.WebApp.showAlert('Раздел в разработке!')">Открыть амбар</button>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
